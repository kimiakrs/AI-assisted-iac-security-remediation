<!DOCTYPE html>
<html>
<head>
  <title>AI DevSecOps Copilot</title>
  <style>
    body { font-family: Arial; background: #f4f6f8; margin: 30px; }
    h1 { color: #222; }
    button { padding: 10px 18px; margin: 8px 8px 8px 0; cursor: pointer; }
    .panel { background: white; padding: 15px; margin-top: 15px; border-radius: 8px; }
    pre { white-space: pre-wrap; word-break: break-word; background: #f7f7f7; padding: 12px; border-radius: 6px; }
  </style>
</head>
<body>

<h1>AI DevSecOps Copilot</h1>

<input type="file" id="fileInput">
<br>

<button onclick="uploadFile()">1. Upload & Scan</button>
<button onclick="runRemediation()">2. Generate Patch + Rescan</button>

<div class="panel">
  <h2>Status</h2>
  <pre id="status">Waiting...</pre>
</div>

<div class="panel">
  <h2>Trusted Report Before Fix</h2>
  <pre id="beforeReport"></pre>
</div>

<div class="panel">
  <h2>Patch Plan</h2>
  <pre id="patchPlan"></pre>
</div>

<div class="panel">
  <h2>Fixed YAML</h2>
  <pre id="fixedYaml"></pre>
</div>

<div class="panel">
  <h2>Trusted Report After Fix</h2>
  <pre id="afterReport"></pre>
</div>

<div class="panel">
  <h2>Before vs After Comparison</h2>
  <pre id="comparison"></pre>
</div>

<div class="panel">
  <h2>LLM Explanation</h2>
  <pre id="llmExplanation"></pre>
</div>

<div class="panel">
  <h2>Saved Report Path</h2>
  <pre id="reportPath"></pre>
</div>

<script>
const API_BASE = "http://192.168.64.3:8000";
let currentFilename = null;

function show(id, data) {
  document.getElementById(id).textContent =
    typeof data === "string" ? data : JSON.stringify(data, null, 2);
}

async function uploadFile() {
  const fileInput = document.getElementById("fileInput");

  if (!fileInput.files.length) {
    show("status", "Please select a YAML file first.");
    return;
  }

  const formData = new FormData();
  formData.append("file", fileInput.files[0]);

  show("status", "Uploading and scanning...");

  try {
    const response = await fetch(`${API_BASE}/scan/upload`, {
      method: "POST",
      body: formData
    });

    const data = await response.json();

    currentFilename = data.filename;

    show("status", {
      status: data.status,
      filename: data.filename,
      detected_type: data.detected_type,
      scanner: data.scanner
    });

    show("beforeReport", data.ai_report);

    show("patchPlan", "");
    show("fixedYaml", "");
    show("afterReport", "");
    show("comparison", "");
    show("llmExplanation", "");
    show("reportPath", "");

  } catch (error) {
    show("status", "Upload failed:\n" + error);
  }
}

async function runRemediation() {
  if (!currentFilename) {
    show("status", "Upload a file first.");
    return;
  }

  show("status", "Generating patch plan, applying patch, rescanning, and asking LLM to explain...");

  try {
    const response = await fetch(
      `${API_BASE}/scan/patch-plan-test?filename=${encodeURIComponent(currentFilename)}`,
      { method: "POST" }
    );

    const data = await response.json();

    show("status", {
      status: data.status,
      original_file: data.original_file,
      fixed_file: data.fixed_file
    });

    show("beforeReport", data.trusted_report_before);
    show("patchPlan", data.patch_plan);
    show("fixedYaml", data.fixed_yaml);
    show("afterReport", data.trusted_report_after);
    show("comparison", data.comparison);
    show("llmExplanation", data.llm_explanation);
    show("reportPath", data.report_path);

  } catch (error) {
    show("status", "Remediation failed:\n" + error);
  }
}
</script>

</body>
</html>
